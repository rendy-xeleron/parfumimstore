<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM Parfum Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-lingkaran">IM</div>
        <a href="https://wa.me/6287749397910" class="wa-float">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        </a>
    </nav>

    <div class="isi-halaman">
        <header class="hero">
            <img src="img/foto-utama.jpg" alt="Parfum Hero" class="gambar-hero">
            <h1 class="gold-text">Wangi premium</h1>
            <p>tahan 6–8 jam</p>
            <h2 class="harga-utama">Mulai dari <span class="gold-text">Rp. 100.000</span></h2>
            <p class="sub-text">Aroma mirip parfum brand terkenal</p>
            <div class="garis-pembatas"></div>
        </header>

        <section class="section-katalog">
            <h2 class="title-section">Best Sellers</h2>
            <div id="katalog-parfum" class="grid-katalog">
                </div>
        </section>

        <div class="container-bawah"><a href="katalog.html" style="text-decoration: none;">
    <button class="btn-katalog">Lihat katalog</button>
</a>

            <!-- Tombol untuk Membuka Chat -->
<button id="chat-toggle-btn" style="position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: #333; color: #fff; border: none; border-radius: 25px; cursor: pointer; z-index: 1000;">
💬 Tanya AromaBot
</button>

<!-- Kotak Chat Tersembunyi -->
<div id="chat-box" style="display: none; position: fixed; bottom: 80px; right: 20px; width: 320px; height: 400px; background: white; border: 1px solid #ccc; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-direction: column; z-index: 1000;">
    <div style="background: #333; color: white; padding: 10px; border-radius: 10px 10px 0 0; font-weight: bold;">AromaBot - Ahli Parfum</div>
    <div id="chat-content" style="flex: 1; padding: 10px; overflow-y: auto; font-size: 14px;"></div>
    <div style="display: flex; border-top: 1px solid #ccc;">
        <input type="text" id="chat-input" placeholder="Cari parfum manis/segar?..." style="flex: 1; padding: 10px; border: none; border-radius: 0 0 0 10px; outline: none;">
        <button id="chat-send" style="padding: 10px; background: #333; color: white; border: none; border-radius: 0 0 10px 0; cursor: pointer;">Kirim</button>
    </div>
</div>
            

    <script src="script.js"></script>
</body>
</html>
